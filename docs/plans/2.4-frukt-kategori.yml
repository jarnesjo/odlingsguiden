verification:
  - "npx tsc --noEmit - inga typfel"
  - "npm run build - main chunk fortfarande <300 KB"
  - "npm run dev - frukt-flik syns, äpple-profil renderas korrekt"
  - "Navigering lista -> profil -> tillbaka fungerar"
