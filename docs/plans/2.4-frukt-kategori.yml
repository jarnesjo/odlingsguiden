meta:
  roadmap_step: "2.4"
  title: "Frukt som fjärde kategori"
  status: planerad
  created: 2026-02-27
  updated: 2026-03-03

context: |
  Roadmap steg 2.4 - Frukt som fjärde kategori. Vi har 77 profiler
  (43 grönsaker, 16 bär, 18 kryddor). Frukt beter sig som bär i kodbasen:
  perenna, beskärning istället för sådd, förökning istället för fröbesparing.
  Vi återanvänder befintliga typer.

  OBS: Sedan session 40 använder kodbasen dynamic import (import.meta.glob)
  för gröddata och illustrationer. Nya profiler registreras i ID_TO_PATH-maps
  istället för statiska imports.

fas_1_infrastruktur:
  description: "Frukt-flik synlig i appen (utan profiler)"
  files:
    - path: src/data/types.ts
      change: "Lägg till 'frukt' i Category-union"
    - path: src/data/categories.ts
      change: "Ny entry: { id: 'frukt', label: 'Frukt', icon: 'fruit', color: '#B8653B' }"
    - path: src/theme/tokens.ts
      change: "Lägg till fruits: { primary: '#B8653B', light: '#F0DDD0' } i colors.category"
    - path: src/theme/global.css
      change: "Lägg till --color-cat-fruits och --color-cat-fruits-light CSS-variabler"
    - path: src/components/icons/index.tsx
      change: "Skapa FruitIcon - abstrakt äppleform, 1.8px stroke, round caps, 24x24"
    - path: src/components/icons/Icon.tsx
      change: "Importera FruitIcon, lägg till fruit: FruitIcon i ICON_MAP"
    - path: src/components/illustrations/CropIcon.tsx
      change: "Lägg till 'frukt': FruitIcon i CATEGORY_ICONS"
    - path: src/components/illustrations/CropGraphic.tsx
      change: "Lägg till 'frukt': FruitIcon i CATEGORY_ICONS"
    - path: src/App.tsx
      change: "Ny route /frukt, uppdatera getViewPath"
    - path: src/components/pages/CropPage.tsx
      change: "Lägg till isFruit, använd PruningSection + PropagationSection som bär"
    - path: src/components/crop/CropHeader.tsx
      change: "Lägg till isFruit - samma labels som bär (Plantavstånd, Plantering)"

