title: "7.5 Grödprofil - alla sektioner i React Native"
status: aktiv
created: 2026-03-06

scope: |
  Bygga ut grödprofilen i Expo-appen med alla sektioner från webben.
  Idag visar crop/[id].tsx bara namn, familj, svårighetsgrad och zon.
  Målet är full paritet med webbens CropPage.

approach: |
  Individuella komponenter i packages/app/src/components/crop/.
  Återanvändbar Section-wrapper (kollapsbar med LayoutAnimation).
  Samma villkorslogik som webben (isBerry/isFruit/isHerb).

