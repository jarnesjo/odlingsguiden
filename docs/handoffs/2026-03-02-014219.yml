meta:
  date: 2026-03-02
  author: claude
  phase: "Fas 2: Innehall & Funktioner"
  status: aktiv
  session_notes: |
    Session 23. Omdesignade vitloksillustrationen.

    Vitloksillustrationen sag ut som en vanlig lok (slat droppform).
    Tre iterationer:
    1. Forsok med klyftlinjer och bulor pa konturen - for subtilt
    2. Bredare/rundare form med undulationer - fortfarande for likt lok
    3. Helt ny approach: individuella klyftor som separata SVG-former
       - 5 klyftor (2 bak, 2 fram-sidor, 1 front-center)
       - Morka faror mellan klyftor
       - Platt basplatta (karaktaristiskt for vitlok)
       - Smal hals dar klyftor konvergerar

    Ikonen ocksa omritad med 3 synliga klyftor.

    Research: botaniska skillnader vitlok vs lok:
    - Vitlok: kantig, oregelbunden, klyftor syns som utbuktningar
    - Lok: slat, symmetrisk, rund, inga utbuktningar

    Commits (1 st):
    - fix(illustrations): redesign garlic with individual clove shapes

