    - Kanda brister i roadmapen avbockade

    Paborjat: 2.1 Fler profiler - batch kryddor (salvia, koriander, citronmeliss)
    - Research-agenter startade men inte klara an
    - Profilformat och illustrationsmonstret kartlagt
    - Inga filer skrivna annu

