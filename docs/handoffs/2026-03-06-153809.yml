meta:
  date: 2026-03-06
  author: claude
  phase: "Epic: Native App - 7.1 Monorepo"
  status: avslutad
  session_notes: |
    Session 59. Monorepo-omstrukturering genomford.

    MONOREPO:
    - npm workspaces: packages/shared, packages/web, packages/app
    - @odlingsguiden/shared: 85 crop-filer, types, zones, categories,
      difficulty, cropList, cropSlugs, cropUtils, slug, monthParser,
      seasonData (sync), tokens
    - @odlingsguiden/web: Vite-app med alla komponenter, hooks,
      illustrationer, SSR, CSS
    - @odlingsguiden/app: placeholder for Expo
    - ~110 filer uppdaterade med @odlingsguiden/shared imports
    - import.meta.glob eliminerat for crop-data (explicita imports)
    - seasonData delad: sync i shared, async wrapper i web

    DEPLOY:
    - dist/ nu i packages/web/dist/
    - Symlink uppdaterad pa servern
    - nginx feedback.php-sokvag uppdaterad
    - feedback.php .env-sokvag fixad (dirname(__DIR__, 3))

    CONFIG:
    - tsconfig.base.json i root (delad TS-config)
    - Workspace-symlinks loser @odlingsguiden/shared utan byggsteg
    - Root package.json har proxy-scripts till web
    - version-script i root kor build+prerender+git add dist

    RELEASE:
    - v1.2.0: monorepo-omstrukturering

commands:
  - "npm run dev          # Vite dev (proxar till packages/web)"
  - "npm run build        # Bygger packages/web till dist/"
  - "npm run prerender    # Prerenderar alla 102 routes"
  - "npm run preview      # Preview packages/web"
  - "npm version patch    # Release: bump + build + prerender + tag"

