meta:
  date: 2026-03-05
  author: claude
  phase: "Epic: Webb & Lansering"
  status: aktiv
  session_notes: |
    Session 56. Deploy, feedback API, OG-taggar, release-flow.

    FEEDBACK API:
    - server/feedback.php med SMTP (STARTTLS, AUTH LOGIN)
    - Rate limiting (3 req/5min per IP, filbaserad)
    - CORS for prod + localhost
    - .env i projektroten (symlinkad av Forge)

    DEPLOY SETUP:
    - Laravel Forge + Digital Ocean, zero downtime deploy
    - Eget Forge-site (subdoman), serveras via symlink under lillabosgarden.se/odlingsguiden
    - Symlink: public/odlingsguiden -> current/dist
    - Nginx: location ^~ /odlingsguiden (loser alias-problem)
    - dist/ committas i git, inget bygge pa servern
    - Deploy = git pull

    BASE PATH:
    - Vite base: /odlingsguiden/
    - BrowserRouter + StaticRouter basename
    - Prerender med BASE_PATH
    - Feedback endpoint: /odlingsguiden/api/feedback

    RELEASE FLOW:
    - npm version patch/minor/major
    - Automatiskt: bump -> build -> prerender -> commit + tag
    - v1.0.0 taggad

    GIT WORKFLOW:
    - Feature branches for utveckling, main = produktion
    - Aldrig pusha direkt till main under dev
    - Fraga alltid anvandaren innan commit/push

    OG-TAGGAR:
    - og:title, og:description, og:url per sida via prerender
    - og:image pekar pa brand/og-image.jpg
    - twitter:card summary_large_image

    OG-BILD (PAGAENDE):
    - Python-script: scripts/generate-og.py (kraver Pillow + cairosvg)
    - 4 varianter genererade, anvandaren ska valja favorit
    - V1: gronsakskasse centrerad, V2: gronsakskasse inline
    - V3: odlingar centrerad, V4: odlingar inline
    - Alla med gron tagline, L:a Bosgarden logo nere vanster, url nere hoger

    DOCS:
    - README.md skapad (intern utvecklar-README)
    - CLAUDE.md uppdaterad: deploy, serverstruktur, branch-strategi, release-flow
    - nginx.conf uppdaterad: symlink + ^~ + current/ paths

