meta:
  date: 2026-03-04
  author: claude
  phase: "Epic: Performance & Kvalitet"
  status: aktiv
  session_notes: |
    Session 53. Tre huvudsakliga arbeten:

    1. ROADMAP OMSTRUKTURERING (klar)
       Bytte från "Faser" till "Epics" i ROADMAP.md och CLAUDE.md.
       Fas 1-4 -> Epic: Grundplattan, Innehall, Funktioner, Performance & Kvalitet,
       Webb & Lansering, Expansion. Steg omnumrerade per epic.
       Committed och pushat.

    2. LCP-OPTIMERING (klar, mergat till main)
       Lazy CropIcon via IntersectionObserver. Forsta 8 ikoner laddas direkt,
       resten nar de scrollas in i vy (200px rootMargin).
       Resultat: LCP 3.1s -> 2.3s, Performance 91 -> 97.
       Committed och pushat.

    3. PRERENDERING SSG (pagaende, feature branch)
       Branch: feature/prerendering
       Skapade prerender-script som bygger SSR-bundle med Vite och renderar
       alla 90 routes till statisk HTML.

       KLART:
       - entry-server.tsx med React 19 prerender() API
       - prerender.ts script som bygger SSR-bundle och renderar alla routes
       - useLocalStorage SSR-guard (typeof window === 'undefined')
       - Startsidan prerenderas korrekt med fullt innehall

       PROBLEM SOM KVARSTAR:
       - Grodprofiler renderas TOMMA under SSR
       - Orsak: CropPage anvander useEffect + loadCrop() for att ladda groddata
       - useEffect kors inte under SSR, sa crop === null -> returnerar null
       - SENASTE FORSOK: preladda alla grodor via loadAllCrops() innan rendering
         men loadCrop/loadAllCrops anvander import.meta.glob som ar dynamisk
         - Aven om cropCache ar fylld sa anvander CropPage useEffect + setState
           for att hamta data, och useEffect kors aldrig under SSR

       LOSNINGSALTERNATIV (inte implementerat an):
       a) Skapa SSR-version av CropPage som tar crop som prop direkt (renast)
       b) Andra CropPage att kolla cropCache synkront i useState-init
       c) Suspense-resource pattern (mer omskrivning)

       Alternativ (b) ar enklast: andra CropPage useState-init fran null till
       cropCache.get(cropId) sa den har data direkt under SSR.

    Lighthouse-rapporter sparade i docs/benchmarks/.

