meta:
  date: 2026-03-02
  author: claude
  phase: "Fas 2: Innehall & Funktioner"
  status: aktiv
  session_notes: |
    Session 25. Faktacheck batch 6 och 7 (8 profiler totalt).

    Batch 6 (krusbar, bjornbar, mullbar, rabarber):
    - 6 kritiska, 10 viktiga, 6 mindre korrigeringar
    - Bjornbar: zonerna kraftigt uppblasta (1-6 -> 1-4), Loch Ness bara zon 1-2
    - Rabarber: rabarbervivel (Lixus concavus) ar nordamerikansk, finns inte i Sverige - borttagen
    - Mullbar: Mulle ar inte "svenskutvecklad hybrid" utan froplanstfynd fran Balsgard/SLU
    - Krusbar: alla sorters zoner overskattade (1-8 -> 1-6)

    Batch 7 (basilika, persilja, dill, graslok):
    - 3 kritiska, 9 viktiga, 5 mindre korrigeringar
    - Dill: korspollinering med fankal/morot ar botanisk myt (olika genus)
    - Dill och basilika: inte sjalvpollinerare utan insektspollinerade
    - Persilja: frost -5C -> -10C, morot borttagen som companion (delar morotsfluga)
    - Graslok: Polyvit markerad som F1, Fina ersatt med Nelly

    Aven: uppdaterat CLAUDE.md commit-format (enklare, inga security hook-workarounds)

    Commits (12 st):
    - docs(claude): simplify git commit format instructions
    - fix(crops): fact-check krusbar profile
    - fix(crops): fact-check bjornbar profile
    - fix(crops): fact-check mullbar profile
    - fix(crops): fact-check rabarber profile
    - docs(research): add batch 6 fact-check report
