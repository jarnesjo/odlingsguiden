meta:
  date: 2026-03-05
  author: claude
  phase: "Epic: Performance & Kvalitet"
  status: avslutad
  session_notes: |
    Session 54. Slutforde prerendering (SSG) - steg 4.3 i roadmap.

    PRERENDERING KOMPLETT:
    - 102 routes prerenderas till statisk HTML (85 grodor, 4 kategorier,
      12 sasongsmanader, startsida)
    - Flash-fri hydration: groddata och sasongsdata inbaddad som JSON
      i prerenderade sidor (__CROP_DATA__, __SEASON_DATA__)
    - Korrekta title och meta description per route
    - Alla CSS-filer (inklusive lazy chunks) injiceras i <head>

    BUGGAR LOSTA:
    - Template-reuse: /-routen skrev over dist/index.html (mallen),
      sa alla efterfoljande routes fick startsidans HTML. Fixat genom
      att spara mallen i minnet innan loopen.
    - Suspense/hidden div: React 19 prerender() placerade Suspense-innehall
      i <div hidden> som forst visades nar JS laddats. Fixat genom att
      ta bort lazy() for CropPage och SeasonView (eager imports).
    - Hydration mismatch: Server renderade utan Suspense, klient med.
      Fixat genom att anvanda samma komponenttrad.
    - Tom sasongssida: SSR hade [] som groups, useEffect kors inte.
      Fixat med ssrSeasonCache och __SEASON_DATA__ JSON.
    - Saknade manadsroutes: /sasong/april gav 404. Fixat genom att
      generera alla 12 manadsroutes.
    - Fel titlar: useDocumentMeta(useEffect) skrev over prerenderade
      titlar vid hydration. Fixat genom att gora CropList kategori-
      och manadsmedveten.

    Branch: feature/prerendering (ej mergad till main an)

