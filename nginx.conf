# Odlingsguiden - Nginx-snippet för lillabosgarden.se
#
# Lägg till detta i Statamics server-block i Laravel Forge
# (Edit Nginx Configuration).
#
# Förutsätter att repot ligger i /home/forge/odlingsguiden.lillabosgarden.se/

# Odlingsguiden SPA
location /odlingsguiden {
    alias /home/forge/odlingsguiden.lillabosgarden.se/dist;
    try_files $uri $uri/ /odlingsguiden/index.html;

    # Cache Vite-byggda assets (innehåller hash i filnamnet)
    location ~* ^/odlingsguiden/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache brand assets (favicon, logotyper)
    location ~* ^/odlingsguiden/brand/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sitemap
    location = /odlingsguiden/sitemap.xml {
        expires 1d;
    }
}

# Feedback API
location = /odlingsguiden/api/feedback {
    fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME /home/forge/odlingsguiden.lillabosgarden.se/server/feedback.php;
}
