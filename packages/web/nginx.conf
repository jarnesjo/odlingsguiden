# Odlingsguiden - Nginx-snippet för lillabosgarden.se
#
# Lägg till detta i Statamics server-block i Laravel Forge
# (Edit Nginx Configuration).
#
# Kräver symlink:
#   ln -s /home/forge/odlingsguiden.lillabosgarden.se/current/packages/web/dist \
#         /home/forge/lillabosgarden.se/public/odlingsguiden
#
# Symlinken skapas en gång - Forges zero downtime deploy
# uppdaterar `current/` automatiskt vid varje deploy.

# Odlingsguiden SPA
location ^~ /odlingsguiden {
    try_files $uri $uri/ /odlingsguiden/index.html;
}

# Feedback API
location = /odlingsguiden/api/feedback {
    fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME /home/forge/odlingsguiden.lillabosgarden.se/current/packages/web/server/feedback.php;
}
